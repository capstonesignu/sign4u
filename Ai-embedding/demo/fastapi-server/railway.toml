[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Volume 마운트: Railway 대시보드에서 /data 경로로 Volume 연결
# 환경변수 설정 필요 (Railway 대시보드 → Variables):
#
#   DATABASE_URL        = (Railway PostgreSQL에서 자동 주입)
#   DATA_API_KEY        = (임의의 비밀 키, 예: openssl rand -hex 32)
#   JBEDU_VIDEO_ROOT    = /data/videos
#   EXP026_ENCODER_PATH = /data/models/encoder_cross_stream_best.pt
#   EXP026_FAISS_PATH   = /data/index/cross_stream_recorded.faiss
#   EXP026_FAISS_LABELS_PATH = /data/index/cross_stream_recorded.faiss.labels.json
#   FEATURE_PRESET      = B
#   PORT                = 8001
