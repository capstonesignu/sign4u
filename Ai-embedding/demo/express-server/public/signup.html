<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원 가입 — KSL Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f1117;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .box {
      width: 360px;
      background: #18181b;
      border: 1px solid #3f3f46;
      border-radius: 12px;
      padding: 2.2rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.3rem;
    }
    .title { text-align: center; }
    .title h1 { font-size: 1.2rem; font-weight: 700; color: #fff; }
    .title p  { font-size: 0.8rem; color: #71717a; margin-top: 0.3rem; }
    form { display: flex; flex-direction: column; gap: 1rem; }
    label { font-size: 0.82rem; color: #a1a1aa; display: flex; flex-direction: column; gap: 0.35rem; }
    input {
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      color: #e4e4e7;
      padding: 0.6rem 0.8rem;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    input:focus { border-color: #3b82f6; }
    button[type="submit"] {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.65rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.2rem;
    }
    button[type="submit"]:hover { background: #2563eb; }
    .msg {
      border-radius: 6px;
      padding: 0.55rem 0.8rem;
      font-size: 0.83rem;
      text-align: center;
      display: none;
    }
    .msg.error   { background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5; }
    .msg.success {
      background: #052e16;
      border: 1px solid #166534;
      color: #86efac;
      font-size: 0.84rem;
      line-height: 1.5;
    }
    .back { text-align: center; font-size: 0.8rem; color: #52525b; }
    .back a { color: #60a5fa; text-decoration: none; }
    .back a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="box">
    <div class="title">
      <h1>회원 가입</h1>
      <p>가입 후 관리자 승인이 필요합니다</p>
    </div>
    <div class="msg error"   id="err-mismatch">비밀번호가 일치하지 않거나 6자 미만이거나 이름이 비어 있습니다.</div>
    <div class="msg error"   id="err-duplicate">이미 사용 중인 아이디입니다.</div>
    <div class="msg error"   id="err-fail">가입에 실패했습니다. 다시 시도해 주세요.</div>
    <div class="msg success" id="ok">
      가입 신청이 완료되었습니다.<br>
      관리자 승인 후 로그인하실 수 있습니다.
    </div>
    <form method="post" action="/signup" id="signup-form">
      <label>
        이름
        <input type="text" name="full_name" autocomplete="name" required autofocus
               minlength="1" maxlength="50" placeholder="홍길동" />
      </label>
      <label>
        아이디
        <input type="text" name="username" autocomplete="username"
               required minlength="2" maxlength="32" />
      </label>
      <label>
        비밀번호 (6자 이상)
        <input type="password" name="password" required minlength="6" />
      </label>
      <label>
        비밀번호 확인
        <input type="password" name="password2" required minlength="6" />
      </label>
      <button type="submit">가입 신청</button>
    </form>
    <div class="back"><a href="/login">← 로그인으로</a></div>
  </div>
  <script>
    const p = new URLSearchParams(location.search);
    if (p.get("error") === "mismatch")  document.getElementById("err-mismatch").style.display  = "block";
    if (p.get("error") === "duplicate") document.getElementById("err-duplicate").style.display = "block";
    if (p.get("error") === "fail")      document.getElementById("err-fail").style.display      = "block";
    if (p.get("success") === "1") {
      document.getElementById("ok").style.display = "block";
      document.getElementById("signup-form").style.display = "none";
    }
  </script>
</body>
</html>
