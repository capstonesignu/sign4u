<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>초기 계정 설정 — KSL Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f1117;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .box {
      width: 360px;
      background: #18181b;
      border: 1px solid #3f3f46;
      border-radius: 12px;
      padding: 2.2rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.3rem;
    }
    .title { text-align: center; }
    .title h1 { font-size: 1.2rem; font-weight: 700; color: #fff; }
    .title p  { font-size: 0.8rem; color: #71717a; margin-top: 0.3rem; }
    .notice {
      background: #1c1917;
      border: 1px solid #44403c;
      border-radius: 6px;
      padding: 0.7rem 0.9rem;
      font-size: 0.8rem;
      color: #a8a29e;
      line-height: 1.5;
    }
    form { display: flex; flex-direction: column; gap: 1rem; }
    label { font-size: 0.82rem; color: #a1a1aa; display: flex; flex-direction: column; gap: 0.35rem; }
    input {
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      color: #e4e4e7;
      padding: 0.6rem 0.8rem;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    input:focus { border-color: #3b82f6; }
    button[type="submit"] {
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.65rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.2rem;
    }
    button[type="submit"]:hover { background: #15803d; }
    .error {
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 6px;
      padding: 0.55rem 0.8rem;
      font-size: 0.83rem;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="title">
      <h1>관리자 계정 생성</h1>
      <p>최초 1회 설정 — 이후 이 페이지는 비활성화됩니다</p>
    </div>
    <div class="notice">
      계정이 없습니다. 아래에서 첫 번째 관리자 계정을 만드세요.<br>
      비밀번호는 최소 6자 이상이어야 합니다.
    </div>
    <div class="error" id="err-mismatch">비밀번호가 일치하지 않거나 6자 미만이거나 이름이 비어 있습니다.</div>
    <div class="error" id="err-db">DB 오류가 발생했습니다. 잠시 후 다시 시도하세요.</div>
    <form method="post" action="/setup">
      <label>
        이름
        <input type="text" name="full_name" autocomplete="name" required autofocus
               minlength="1" maxlength="50" placeholder="홍길동" />
      </label>
      <label>
        아이디
        <input type="text" name="username" autocomplete="username"
               required minlength="2" maxlength="32" />
      </label>
      <label>
        비밀번호 (6자 이상)
        <input type="password" name="password" autocomplete="new-password" required minlength="6" />
      </label>
      <label>
        비밀번호 확인
        <input type="password" name="password2" autocomplete="new-password" required minlength="6" />
      </label>
      <button type="submit">계정 생성</button>
    </form>
  </div>
  <script>
    const p = new URLSearchParams(location.search);
    if (p.get("error") === "1") document.getElementById("err-mismatch").style.display = "block";
    if (p.get("error") === "2") document.getElementById("err-db").style.display = "block";
  </script>
</body>
</html>
