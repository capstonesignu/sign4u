<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — KSL Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f1117;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .box {
      width: 340px;
      background: #18181b;
      border: 1px solid #3f3f46;
      border-radius: 12px;
      padding: 2.2rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.3rem;
    }
    .title { text-align: center; }
    .title h1 { font-size: 1.25rem; font-weight: 700; color: #fff; }
    .title p  { font-size: 0.8rem; color: #71717a; margin-top: 0.3rem; }
    form { display: flex; flex-direction: column; gap: 1rem; }
    label { font-size: 0.82rem; color: #a1a1aa; display: flex; flex-direction: column; gap: 0.35rem; }
    input[type="text"], input[type="password"] {
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      color: #e4e4e7;
      padding: 0.6rem 0.8rem;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    input:focus { border-color: #3b82f6; }
    button[type="submit"] {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.65rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.2rem;
    }
    button[type="submit"]:hover { background: #2563eb; }
    .msg {
      border-radius: 6px;
      padding: 0.55rem 0.8rem;
      font-size: 0.83rem;
      text-align: center;
      display: none;
    }
    .msg.error   { background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5; }
    .msg.warning { background: #451a03; border: 1px solid #7c2d12; color: #fdba74; }
    .msg.success { background: #052e16; border: 1px solid #166534; color: #86efac; }
    .bottom { text-align: center; font-size: 0.78rem; color: #52525b; }
    .bottom a { color: #60a5fa; text-decoration: none; }
    .bottom a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="box">
    <div class="title">
      <h1>KSL Sign Language Demo</h1>
      <p>수어 데이터 수집 시스템</p>
    </div>
    <div class="msg error"   id="err-invalid">아이디 또는 비밀번호가 올바르지 않습니다.</div>
    <div class="msg warning" id="err-pending">승인 대기 중입니다. 관리자에게 승인을 요청하세요.</div>
    <div class="msg success" id="ok-setup">관리자 계정이 생성되었습니다. 로그인하세요.</div>
    <form method="post" action="/login">
      <label>
        아이디
        <input type="text" name="username" autocomplete="username" required autofocus />
      </label>
      <label>
        비밀번호
        <input type="password" name="password" autocomplete="current-password" required />
      </label>
      <button type="submit">로그인</button>
    </form>
    <div class="bottom"><a href="/signup">계정이 없으신가요? 회원 가입</a></div>
  </div>
  <script>
    const p = new URLSearchParams(location.search);
    if (p.get("error") === "1")       document.getElementById("err-invalid").style.display = "block";
    if (p.get("error") === "pending") document.getElementById("err-pending").style.display = "block";
    if (p.get("setup") === "1")       document.getElementById("ok-setup").style.display    = "block";
  </script>
</body>
</html>
