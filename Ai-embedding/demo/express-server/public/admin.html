<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>계정 관리 — KSL Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f1117;
      color: #e4e4e7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #27272a;
      background: #18181b;
    }
    .topbar-title { font-size: 1rem; font-weight: 700; color: #fff; }
    .topbar-actions { display: flex; gap: 0.6rem; align-items: center; }
    .link-btn {
      color: #60a5fa;
      text-decoration: none;
      font-size: 0.82rem;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    .link-btn:hover { text-decoration: underline; }
    .sep { color: #3f3f46; font-size: 0.75rem; }
    .content { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
    .section { margin-bottom: 2.5rem; }
    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      color: #71717a;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .badge {
      background: #ef4444;
      color: #fff;
      font-size: 0.65rem;
      border-radius: 99px;
      padding: 0.1rem 0.45rem;
      font-weight: 700;
    }
    .badge.zero { background: #27272a; color: #52525b; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      overflow: hidden;
    }
    th {
      background: #1c1c1f;
      color: #52525b;
      font-size: 0.7rem;
      font-weight: 700;
      text-align: left;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #27272a;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    td {
      padding: 0.7rem 1rem;
      border-bottom: 1px solid #1c1c1f;
      font-size: 0.86rem;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .pill {
      display: inline-block;
      border-radius: 4px;
      padding: 0.15rem 0.45rem;
      font-size: 0.7rem;
      font-weight: 700;
    }
    .pill-admin { background: #1e3a8a; color: #93c5fd; }
    .pill-user  { background: #1c1c1f; color: #71717a; }
    .actions { display: flex; gap: 0.35rem; }
    .btn {
      border: none;
      border-radius: 5px;
      padding: 0.28rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.12s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-approve { background: #16a34a; color: #fff; }
    .btn-reject  { background: #991b1b; color: #fca5a5; }
    .btn-delete  { background: #27272a; color: #f87171; }
    .empty {
      text-align: center;
      color: #3f3f46;
      padding: 1.8rem;
      font-size: 0.84rem;
    }
    .date { color: #52525b; font-size: 0.78rem; }
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: #18181b;
      border: 1px solid #3f3f46;
      color: #e4e4e7;
      padding: 0.55rem 1.2rem;
      border-radius: 8px;
      font-size: 0.83rem;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.visible { opacity: 1; }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-title">계정 관리</span>
    <div class="topbar-actions">
      <a href="/" class="link-btn">← 메인으로</a>
      <span class="sep">|</span>
      <form method="post" action="/logout" style="display:inline">
        <button type="submit" class="link-btn">로그아웃</button>
      </form>
    </div>
  </div>

  <div class="content">
    <!-- 승인 대기 -->
    <div class="section">
      <div class="section-title">
        승인 대기
        <span class="badge zero" id="pending-badge">0</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>이름</th>
            <th>아이디</th>
            <th>가입일</th>
            <th>작업</th>
          </tr>
        </thead>
        <tbody id="pending-body">
          <tr><td colspan="4" class="empty">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- 활성 계정 -->
    <div class="section">
      <div class="section-title">활성 계정</div>
      <table>
        <thead>
          <tr>
            <th>이름</th>
            <th>아이디</th>
            <th>구분</th>
            <th>가입일</th>
            <th>작업</th>
          </tr>
        </thead>
        <tbody id="users-body">
          <tr><td colspan="5" class="empty">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let _toastTimer = null;
    function showToast(msg, ok = true) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.style.borderColor = ok ? "#16a34a" : "#991b1b";
      el.classList.add("visible");
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => el.classList.remove("visible"), 2500);
    }

    function fmtDate(iso) {
      if (!iso) return "-";
      const d = new Date(iso);
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
    }

    async function loadPending() {
      const res  = await fetch("/admin/pending");
      const data = await res.json();
      const users = data.users || [];
      const badge = document.getElementById("pending-badge");
      badge.textContent = users.length;
      badge.className = "badge" + (users.length ? "" : " zero");

      const tbody = document.getElementById("pending-body");
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty">대기 중인 계정이 없습니다</td></tr>';
        return;
      }
      tbody.innerHTML = users.map(u => `
        <tr id="pr-${u.id}">
          <td>${esc(u.full_name || "-")}</td>
          <td>${esc(u.username)}</td>
          <td class="date">${fmtDate(u.created_at)}</td>
          <td><div class="actions">
            <button class="btn btn-approve" onclick="approve(${u.id})">승인</button>
            <button class="btn btn-reject"  onclick="reject(${u.id}, '${esc(u.username)}')">거부</button>
          </div></td>
        </tr>`).join("");
    }

    async function loadUsers() {
      const res  = await fetch("/admin/users");
      const data = await res.json();
      const users = data.users || [];
      const tbody = document.getElementById("users-body");
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty">활성 계정이 없습니다</td></tr>';
        return;
      }
      tbody.innerHTML = users.map(u => `
        <tr id="ur-${u.id}">
          <td>${esc(u.full_name || "-")}</td>
          <td>${esc(u.username)}</td>
          <td><span class="pill ${u.is_admin ? "pill-admin" : "pill-user"}">${u.is_admin ? "관리자" : "일반"}</span></td>
          <td class="date">${fmtDate(u.created_at)}</td>
          <td>${u.is_admin ? "" :
            `<button class="btn btn-delete" onclick="removeUser(${u.id}, '${esc(u.username)}')">삭제</button>`
          }</td>
        </tr>`).join("");
    }

    function esc(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    async function approve(id) {
      const res  = await fetch("/admin/approve", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: id }),
      });
      const data = await res.json();
      if (data.ok) { showToast("계정을 승인했습니다"); await refresh(); }
      else showToast("승인 실패", false);
    }

    async function reject(id, username) {
      if (!confirm(`"${username}" 가입을 거부하시겠습니까? 계정이 삭제됩니다.`)) return;
      const res  = await fetch("/admin/reject", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: id }),
      });
      const data = await res.json();
      if (data.ok) { showToast("가입을 거부했습니다"); await loadPending(); }
      else showToast("거부 실패", false);
    }

    async function removeUser(id, username) {
      if (!confirm(`"${username}" 계정을 삭제하시겠습니까?`)) return;
      const res  = await fetch("/admin/reject", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: id }),
      });
      const data = await res.json();
      if (data.ok) { showToast("계정을 삭제했습니다"); await loadUsers(); }
      else showToast("삭제 실패", false);
    }

    async function refresh() {
      await Promise.all([loadPending(), loadUsers()]);
    }

    refresh();
  </script>
</body>
</html>
